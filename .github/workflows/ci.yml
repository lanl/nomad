name: CI
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  UV_FROZEN: "1"
  UV_LINK_MODE: symlink
  UV_PYTHON: 3.12.12
  UV_TORCH_BACKEND: cpu
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          cache-suffix: lint
      - name: Run lint checks
        run: uv run --group dev just lint
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          cache-suffix: test
      - name: Run tests
        run: uv run --group dev just test -n auto
