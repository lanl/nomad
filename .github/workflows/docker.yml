name: Docker
on:
  pull_request:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  demo-image:
    name: Demo Image
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Free Disk Space (Ubuntu)
        if: ${{ !env.ACT }}
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
      - uses: actions/checkout@v7
        with:
          lfs: true
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        if: github.event_name == 'release'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build demo image
        id: build
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            image="ghcr.io/${{ github.repository }}:${{ github.event.release.tag_name }}"
            platforms="linux/amd64,linux/arm64"
            output="--push"
          else
            image="nomad-demo:ci"
            platforms="linux/amd64"
            output="--load"
          fi
          cache=()
          if [[ "${ACT:-}" != "true" ]]; then
            cache=(
              --cache-from type=gha,scope=demo-image
              --cache-to type=gha,scope=demo-image,mode=max
            )
          fi
          docker buildx build \
            --tag "${image}" \
            --platform "${platforms}" \
            "${cache[@]}" \
            --file container/demo/Dockerfile \
            "${output}" \
            .
          echo "image=${image}" >> "${GITHUB_OUTPUT}"
      - name: Smoke test demo image
        run: |
          container="nomad-demo-smoke"
          trap 'docker logs "${container}"; docker rm --force "${container}"' EXIT
          docker run --detach \
            --name "${container}" \
            --publish 38217:38217 \
            "${{ steps.build.outputs.image }}" \
            serve \
            --transport=streamable-http \
            --host=0.0.0.0 \
            --port=38217 \
            /nomad/container/demo/nomad-smoke.yml

          for attempt in {1..60}; do
            if curl --silent --output /dev/null http://127.0.0.1:38217/mcp; then
              exit 0
            fi
            if [[ "$(docker inspect --format '{{.State.Running}}' "${container}")" != "true" ]]; then
              exit 1
            fi
            sleep 5
          done
          echo "Server did not start within 5 minutes" >&2
          exit 1
      - name: Resolve image digest
        id: digest
        if: github.event_name == 'release'
        run: |
          digest="$(docker buildx imagetools inspect \
            "${{ steps.build.outputs.image }}" \
            | awk '/^Digest:/ {print $2; exit}')"
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"
      - name: Attest image provenance
        if: github.event_name == 'release'
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true
