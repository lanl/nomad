name: Docker
on:
  pull_request:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  demo-image:
    name: Demo Image
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build demo image
        id: build
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            image="ghcr.io/${{ github.repository }}:${{ github.event.release.tag_name }}"
            output="--push"
          else
            image="nomad-demo:ci"
            output="--output=type=cacheonly"
          fi
          docker buildx build \
            --tag "${image}" \
            --platform linux/amd64,linux/arm64 \
            --cache-from type=gha,scope=demo-image \
            --cache-to type=gha,scope=demo-image,mode=max \
            --file container/demo/Dockerfile \
            "${output}" \
            .
          echo "image=${image}" >> "${GITHUB_OUTPUT}"
      - name: Resolve image digest
        id: digest
        if: github.event_name == 'release'
        run: |
          digest="$(docker buildx imagetools inspect \
            "${{ steps.build.outputs.image }}" \
            | awk '/^Digest:/ {print $2; exit}')"
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"
      - name: Attest image provenance
        if: github.event_name == 'release'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.build.outputs.image }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true
